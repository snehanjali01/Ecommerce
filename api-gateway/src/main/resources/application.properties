spring.application.name=api-gateway
server.port=8070

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.mvc.routes[1].id=product-service
spring.cloud.gateway.mvc.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/products/**

spring.cloud.gateway.mvc.routes[2].id=cart-service
spring.cloud.gateway.mvc.routes[2].uri=lb://CART-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.mvc.routes[3].id=order-service
spring.cloud.gateway.mvc.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.mvc.routes[4].id=payment-service
spring.cloud.gateway.mvc.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.mvc.routes[5].id=wishlist-service
spring.cloud.gateway.mvc.routes[5].uri=lb://WISHLIST-SERVICE
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/api/wishlist/**
